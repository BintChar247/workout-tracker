<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mas Bimbim — Bodyweight Program</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --card: #1c1c1c;
  --border: #2a2a2a;
  --accent: #d4f344;
  --accent2: #44c4f3;
  --muted: #555;
  --text: #f0f0f0;
  --text2: #888;
  --done-bg: #1a2208;
  --done-border: #3a5210;
  --radius: 12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* Layout */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.main{padding:32px;max-width:900px}

/* Sidebar */
.logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent);line-height:1}
.logo-sub{font-size:11px;color:var(--text2);letter-spacing:.1em;margin-top:2px}
.sidebar-date{padding:0 20px;margin-bottom:8px;font-size:11px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;font-size:13px;color:var(--text2)}
.nav-item:hover{background:#ffffff08;color:var(--text)}
.nav-item.active{border-left-color:var(--accent);background:#d4f34410;color:var(--accent)}
.nav-date{font-family:'DM Mono',monospace;font-size:11px;min-width:28px;text-align:center;background:var(--border);padding:2px 5px;border-radius:4px}
.nav-tag{font-size:10px;padding:1px 6px;border-radius:3px;margin-left:auto}
.tag-upper{background:#0c2240;color:#85b7eb}
.tag-lower{background:#0e2a10;color:#97c459}
.tag-abs{background:#1e1040;color:#afa9ec}
.tag-cardio{background:#2a1a04;color:#ef9f27}
.tag-full{background:#2a1008;color:#f0997b}
.tag-rest{background:#1a1a1a;color:#888}
.nav-progress{width:100%;height:2px;background:var(--border);margin-top:4px;border-radius:1px;overflow:hidden}
.nav-bar{height:100%;background:var(--accent);border-radius:1px;transition:width .3s}
.sidebar-section{padding:16px 20px 8px;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:8px}

/* Header */
.page-header{margin-bottom:32px}
.day-hero{display:flex;align-items:flex-end;gap:16px;margin-bottom:8px}
.day-big{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:1;color:var(--text);letter-spacing:3px}
.day-info{padding-bottom:8px}
.day-title{font-size:22px;font-weight:600;color:var(--text)}
.day-sub{font-size:14px;color:var(--text2);margin-top:2px}
.cheer-box{background:linear-gradient(135deg,#d4f34412,#44c4f308);border:1px solid #d4f34430;border-radius:var(--radius);padding:14px 18px;margin-top:16px;font-size:14px;line-height:1.6;color:var(--text)}
.cheer-icon{display:inline-block;margin-right:8px;font-size:18px}

/* Progress bar */
.progress-bar-wrap{margin:20px 0;background:var(--card);border-radius:var(--radius);padding:16px 20px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:8px}
.progress-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.progress-pct{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--accent)}

/* Muscle group section */
.muscle-section{margin-bottom:28px}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
.section-count{font-size:12px;color:var(--text2);margin-left:auto;font-family:'DM Mono',monospace}

/* Exercise card */
.ex-grid{display:grid;gap:10px}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:0;overflow:hidden;transition:all .2s;cursor:pointer;user-select:none}
.ex-card:hover{border-color:var(--muted)}
.ex-card.done{background:var(--done-bg);border-color:var(--done-border)}
.ex-card.done .ex-name{color:#7a9440;text-decoration:line-through;text-decoration-color:#5a7430}
.ex-card.done .ex-sets{color:#4a6020}
.ex-illus{width:72px;height:72px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#111;border-right:1px solid var(--border)}
.ex-card.done .ex-illus{background:#0e1a05;border-right-color:var(--done-border)}
.ex-body{flex:1;padding:12px 14px}
.ex-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px;transition:color .2s}
.ex-sets{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace}
.ex-check{width:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.ex-card.done .check-circle{background:var(--accent);border-color:var(--accent)}
.check-mark{display:none;width:12px;height:12px}
.ex-card.done .check-mark{display:block}

/* Rest day */
.rest-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center}
.rest-icon{font-size:48px;margin-bottom:12px}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:8px;color:var(--text2)}
.rest-text{font-size:14px;color:var(--text2);line-height:1.7;max-width:320px;margin:0 auto}

/* Completed state */
.all-done{background:linear-gradient(135deg,#d4f34418,#44c4f310);border:1px solid var(--accent);border-radius:var(--radius);padding:24px;text-align:center;margin-top:16px;animation:pulse-glow 2s ease-in-out infinite}
.all-done-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent);margin-bottom:6px}
.all-done-text{font-size:14px;color:var(--text2);line-height:1.6}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px #d4f34420}50%{box-shadow:0 0 40px #d4f34440}}

/* SVG illustrations */
svg.ex-svg{width:52px;height:52px}

/* Responsive */
@media(max-width:700px){
  .app{grid-template-columns:1fr}
  .sidebar{height:auto;position:relative;border-right:none;border-bottom:1px solid var(--border)}
  .main{padding:20px}
  .day-big{font-size:48px}
}
</style>

// ─── STATE ───────────────────────────────────────────────────────────────────
function loadState() {
  try { return JSON.parse(localStorage.getItem('mbp_state') || '{}'); } catch(e){return{}}
}
function saveState(s) {
  localStorage.setItem('mbp_state', JSON.stringify(s));
}
let state = loadState();
let currentIdx = 0;

// ─── HELPERS ────────────────────────────────────────────────────────────────
function tagClass(t){return{upper:'tag-upper',lower:'tag-lower',abs:'tag-abs',cardio:'tag-cardio',full:'tag-full',rest:'tag-rest'}[t]}
function allExIds(day){ return day.groups.flatMap(g=>g.exercises.map(e=>e.id)); }
function completedCount(day){ const ids=allExIds(day); return ids.filter(id=>state[id]).length; }
function totalCount(day){ return allExIds(day).length; }
function pct(day){ const t=totalCount(day); return t===0?100:Math.round(completedCount(day)/t*100); }
function getCheer(day){
  const arr=CHEERS[day.type]||['Today is a great day to train.'];
  return arr[day.date % arr.length];
}

// ─── RENDER NAV ──────────────────────────────────────────────────────────────
function renderNav(){
  const nav = document.getElementById('nav-list');
  let html = '<div class="sidebar-section">Week 1 — Mar 15</div>';
  PROGRAM.forEach((day, idx) => {
    if(idx === 7) html += '<div class="sidebar-section">Week 2 — Mar 22</div>';
    const p = pct(day);
    const isActive = idx === currentIdx;
    html += `<div class="nav-item${isActive?' active':''}" onclick="goDay(${idx})">
      <span class="nav-date">${day.date}</span>
      <span>${day.day}</span>
      <span class="nav-tag ${tagClass(day.type)}">${day.label}</span>
    </div>
    <div style="padding:0 20px 6px">
      <div class="nav-progress"><div class="nav-bar" style="width:${p}%"></div></div>
    </div>`;
  });
  nav.innerHTML = html;
}

// ─── RENDER MAIN ─────────────────────────────────────────────────────────────
function renderMain(){
  const day = PROGRAM[currentIdx];
  const main = document.getElementById('main-content');
  const done = completedCount(day);
  const total = totalCount(day);
  const p = pct(day);
  const cheer = getCheer(day);
  const allDone = total > 0 && done === total;

  let html = `<div class="page-header">
    <div class="day-hero">
      <div class="day-big">MAR ${day.date}</div>
      <div class="day-info">
        <div class="day-title">${day.label}</div>
        <div class="day-sub">${day.day}day &nbsp;·&nbsp; ${done}/${total} done</div>
      </div>
    </div>
    <div class="cheer-box"><span class="cheer-icon">&#9889;</span>${cheer}</div>
  </div>`;

  if(total > 0){
    html += `<div class="progress-bar-wrap">
      <div class="progress-label"><span>Today's progress</span><span class="progress-pct">${p}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${p}%"></div></div>
    </div>`;
  }

  if(day.type === 'rest'){
    html += `<div class="rest-card">
      <div class="rest-icon">&#128564;</div>
      <div class="rest-title">Rest &amp; Recover</div>
      <div class="rest-text">Active recovery — light walk 20–30 min if you like. Stretch gently. Hydrate well. Your muscles grow during rest, not during the workout. You've earned this.</div>
    </div>`;
  } else {
    day.groups.forEach(group => {
      html += `<div class="muscle-section">
        <div class="section-head">
          <div class="section-icon" style="background:${group.color}20;border:1px solid ${group.color}60"></div>
          <div class="section-title">${group.name}</div>
          <div class="section-count">${group.exercises.filter(e=>state[e.id]).length}/${group.exercises.length}</div>
        </div>
        <div class="ex-grid">`;
      group.exercises.forEach(ex => {
        const isDone = !!state[ex.id];
        const svgStr = SVG[ex.svg] || SVG.pushup;
        html += `<div class="ex-card${isDone?' done':''}" onclick="toggleEx('${ex.id}')">
          <div class="ex-illus">${svgStr}</div>
          <div class="ex-body">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sets">${ex.sets}</div>
          </div>
          <div class="ex-check">
            <div class="check-circle">
              <svg class="check-mark" viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3" stroke="#0e0e0e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });
  }

  if(allDone){
    const msgs = [
      "SESSION COMPLETE. You did every single rep. That's the kind of discipline that builds real results.",
      "ALL DONE. No skips, no shortcuts. Today you won.",
      "CRUSHED IT. Every exercise checked off. This is how champions are built — one session at a time.",
    ];
    html += `<div class="all-done">
      <div class="all-done-title">&#10003; ${msgs[day.date % msgs.length].split('.')[0]}</div>
      <div class="all-done-text">${msgs[day.date % msgs.length]}</div>
    </div>`;
  }

  main.innerHTML = html;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function toggleEx(id){
  state[id] = !state[id];
  saveState(state);
  renderMain();
  renderNav();
}
function goDay(idx){
  currentIdx = idx;
  renderNav();
  renderMain();
  document.querySelector('.main').scrollTo?.(0,0);
  window.scrollTo(0,0);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderNav();
renderMain();
</script>
</body>
</html>
